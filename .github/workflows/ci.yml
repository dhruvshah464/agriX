name: CI

on:
  push:
    branches: ["main", "develop", "codex/**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Compile check
        run: |
          python -m compileall backend data_pipeline ml_models climate_forecasting satellite_analysis rag_assistant geospatial dashboards

      - name: Run tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/react_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/react_app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
