services:
  postgres:
    image: postgres:16-alpine
    container_name: agrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrix}
      POSTGRES_USER: ${POSTGRES_USER:-agrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrix}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrix} -d ${POSTGRES_DB:-agrix}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agrix-net

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: agrix-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://agrix:agrix@postgres:5432/agrix}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agrix-net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    container_name: agrix-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - agrix-net

volumes:
  pgdata:

networks:
  agrix-net:
    driver: bridge
